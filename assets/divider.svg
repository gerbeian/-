<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 4" width="800" height="4">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0066cc" stop-opacity="0"/>
      <stop offset="20%" stop-color="#0066cc" stop-opacity="0">
        <animate attributeName="stop-opacity" values="0;0.5;0" dur="3s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" stop-color="#2997ff" stop-opacity="0.8">
        <animate attributeName="stop-opacity" values="0.8;0.3;0.8" dur="3s" repeatCount="indefinite"/>
      </stop>
      <stop offset="80%" stop-color="#0066cc" stop-opacity="0">
        <animate attributeName="stop-opacity" values="0;0.5;0" dur="3s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#0066cc" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="800" height="4" fill="url(#g)" rx="2"/>
</svg>