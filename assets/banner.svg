<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 240" width="800" height="240">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628"/>
      <stop offset="50%" style="stop-color:#0d2137"/>
      <stop offset="100%" style="stop-color:#0a1628"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0066cc">
        <animate attributeName="stop-color" values="#0066cc;#2997ff;#0066cc" dur="3s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" style="stop-color:#2997ff">
        <animate attributeName="stop-color" values="#2997ff;#0066cc;#2997ff" dur="3s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <radialGradient id="orb1" cx="20%" cy="30%">
      <stop offset="0%" style="stop-color:#0066cc;stop-opacity:0.15">
        <animate attributeName="stop-opacity" values="0.15;0.08;0.15" dur="4s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" style="stop-color:#0066cc;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="orb2" cx="80%" cy="60%">
      <stop offset="0%" style="stop-color:#2997ff;stop-opacity:0.1">
        <animate attributeName="stop-opacity" values="0.1;0.05;0.1" dur="5s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" style="stop-color:#2997ff;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <rect width="800" height="240" fill="url(#bg)"/>
  <rect width="800" height="240" fill="url(#orb1)"/>
  <rect width="800" height="240" fill="url(#orb2)"/>

  <!-- 粒子 -->
  <circle cx="120" cy="60" r="1.5" fill="#2997ff" opacity="0.6">
    <animate attributeName="opacity" values="0.6;0;0.6" dur="2.5s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="60;40;60" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="680" cy="180" r="1" fill="#0066cc" opacity="0.5">
    <animate attributeName="opacity" values="0.5;0;0.5" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="180;200;180" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="350" cy="200" r="1.5" fill="#2997ff" opacity="0.4">
    <animate attributeName="opacity" values="0.4;0;0.4" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="550" cy="50" r="1" fill="#0066cc" opacity="0.5">
    <animate attributeName="opacity" values="0.5;0;0.5" dur="3.5s" repeatCount="indefinite"/>
  </circle>

  <!-- 主标题 -->
  <text x="400" y="100" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="72" font-weight="700" fill="url(#textGrad)" filter="url(#glow)">
    正 气
  </text>

  <!-- 副标题 -->
  <text x="400" y="145" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="18" fill="#8899aa" letter-spacing="8">
    <animate attributeName="opacity" values="0.6;0.9;0.6" dur="4s" repeatCount="indefinite"/>
    修身养性 · 正气存内
  </text>

  <!-- 底部线 -->
  <line x1="300" y1="170" x2="500" y2="170" stroke="#0066cc" stroke-width="0.5" opacity="0.3">
    <animate attributeName="x1" values="300;250;300" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="x2" values="500;550;500" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.3;0.6;0.3" dur="4s" repeatCount="indefinite"/>
  </line>

  <!-- 版本标签 -->
  <text x="400" y="200" text-anchor="middle" font-family="monospace" font-size="12" fill="#556677">
    Android · iOS · SwiftUI · Jetpack Compose
  </text>
</svg>